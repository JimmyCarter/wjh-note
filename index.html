<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语文笔记生成器 - 强制重新生成版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        .search-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .input-group input {
            flex: 1;
            padding: 15px 20px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
        }
        
        .input-group input:focus {
            border-color: #667eea;
        }
        
        .input-group button {
            padding: 15px 30px;
            font-size: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .input-group button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            display: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .result-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            display: none;
        }
        
        .result-header {
            background: #f8f9fa;
            padding: 20px 30px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .result-header h2 {
            color: #333;
        }
        
        .result-header .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .copy-btn, .download-btn, .delete-file-btn, .manage-btn {
            padding: 8px 16px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .copy-btn {
            background: #28a745;
        }
        
        .download-btn {
            background: #667eea;
        }

        .manage-btn {
            background: #6c757d;
        }

        .delete-file-btn {
            background: #dc3545;
            padding: 4px 10px;
            font-size: 0.8rem;
        }

        .manage-card {
            background: white;
            border-radius: 20px;
            padding: 24px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-top: 24px;
        }

        .manage-card h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: #444;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border: 1px solid #eee;
            border-radius: 10px;
            background: #fafafa;
        }

        .file-item span {
            font-size: 0.95rem;
            color: #333;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 9999;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        
        .note-content {
            padding: 30px;
            line-height: 1.8;
            max-height: 600px;
            overflow-y: auto;
            font-family: inherit;
        }
        .note-content h1 { font-size: 1.8rem; margin: 20px 0 10px; color: #333; }
        .note-content h2 { font-size: 1.4rem; margin: 15px 0 10px; color: #555; border-bottom: 2px solid #eee; padding-bottom: 4px; }
        .note-content h3 { font-size: 1.2rem; margin: 12px 0 8px; color: #667eea; }
        .note-content h4 { font-size: 1.1rem; margin: 10px 0 5px; color: #764ba2; }
        .note-content hr { margin: 20px 0; border: none; border-top: 1px solid #eee; }
        .note-content blockquote { border-left: 4px solid #667eea; padding-left: 15px; margin: 10px 0; color: #666; }
        .note-content table { border-collapse: collapse; width: 100%; margin: 12px 0; }
        .note-content th, .note-content td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
        .note-content th { background: #f0f0f8; color: #555; font-weight: bold; }
        .note-content tr:nth-child(even) { background: #fafafa; }
        .note-content p { margin: 8px 0; }
        .note-content ul, .note-content ol { padding-left: 1.5em; margin: 8px 0; }
        .note-content code { background: #f4f4f8; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        
        .error-card {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        
        .token-status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
        }
        
        .token-ok {
            background: #d4edda;
            color: #155724;
        }
        
        .token-missing {
            background: #fff3cd;
            color: #856404;
        }
        
        .progress-info {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #666;
        }
        
        .warning {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.85rem;
            text-align: center;
        }
        
        .token-input-section {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #dee2e6;
        }
        
        .token-input-section label {
            display: block;
            font-size: 0.9rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
        }
        
        .token-input-row {
            display: flex;
            gap: 10px;
        }
        
        .token-input-row input {
            flex: 1;
            padding: 10px 15px;
            font-size: 0.9rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            font-family: monospace;
        }
        
        .token-input-row input:focus {
            border-color: #667eea;
        }
        
        .token-save-btn {
            padding: 10px 20px;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }
        
        .token-save-btn:hover {
            opacity: 0.9;
        }
        
        .token-hint {
            margin-top: 8px;
            font-size: 0.78rem;
            color: #888;
        }
        
        .repo-config-section {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #dee2e6;
        }
        
        .repo-config-section label {
            display: block;
            font-size: 0.9rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
        }
        
        .repo-input-row {
            display: flex;
            gap: 10px;
        }
        
        .repo-input-row input {
            flex: 1;
            padding: 10px 15px;
            font-size: 0.9rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            font-family: monospace;
        }
        
        .repo-input-row input:focus {
            border-color: #667eea;
        }
        
        .repo-save-btn {
            padding: 10px 20px;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }
        
        .repo-save-btn:hover {
            opacity: 0.9;
        }
        
        .repo-hint {
            margin-top: 8px;
            font-size: 0.78rem;
            color: #888;
        }

        .prompt-section {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #dee2e6;
        }

        .prompt-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .prompt-section-header label {
            font-size: 0.9rem;
            font-weight: bold;
            color: #555;
        }

        .prompt-toggle-btn {
            padding: 5px 12px;
            font-size: 0.82rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .prompt-body {
            display: none;
        }

        .prompt-body textarea {
            width: 100%;
            height: 300px;
            padding: 10px;
            font-size: 0.85rem;
            font-family: monospace;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            outline: none;
            box-sizing: border-box;
        }

        .prompt-body textarea:focus {
            border-color: #667eea;
        }

        .prompt-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .prompt-save-btn {
            padding: 7px 16px;
            font-size: 0.85rem;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .prompt-reset-btn {
            padding: 7px 16px;
            font-size: 0.85rem;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .prompt-hint {
            font-size: 0.78rem;
            color: #888;
            margin-top: 6px;
        }

        .prompt-status {
            font-size: 0.82rem;
            margin-top: 6px;
        }
        
        .repo-current {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #28a745;
        }
        
        /* 移动端适配 */
        @media (max-width: 600px) {
            body {
                padding: 20px 15px;
            }
            
            header {
                margin-bottom: 25px;
            }
            
            header h1 {
                font-size: 1.5rem;
            }
            
            header p {
                font-size: 0.85rem;
            }
            
            .search-card {
                padding: 20px 15px;
                border-radius: 15px;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .input-group input {
                padding: 14px 16px;
                font-size: 16px; /* 防止 iOS 缩放 */
            }
            
            .input-group button {
                padding: 14px 20px;
                width: 100%;
            }
            
            .result-card {
                border-radius: 15px;
            }
            
            .result-header {
                padding: 15px 20px;
                flex-direction: column;
                align-items: flex-start;
            }
            
            .result-header h2 {
                font-size: 1.2rem;
            }
            
            .btn-group {
                width: 100%;
                margin-top: 10px;
            }
            
            .copy-btn, .download-btn {
                flex: 1;
                text-align: center;
                padding: 10px 12px;
                font-size: 0.85rem;
            }
            
            .note-content {
                padding: 20px 15px;
                max-height: none;
                font-size: 0.95rem;
                line-height: 1.7;
            }
            
            .token-input-row,
            .repo-input-row {
                flex-direction: column;
            }
            
            .token-input-row input,
            .repo-input-row input {
                width: 100%;
            }
            
            .token-save-btn,
            .repo-save-btn {
                width: 100%;
                margin-top: 10px;
            }
            
            .loading {
                padding: 30px 20px;
            }
            
            .error-card {
                padding: 15px;
                font-size: 0.9rem;
            }
            
            .warning {
                font-size: 0.8rem;
                padding: 8px;
            }
            
            .progress-info {
                font-size: 0.8rem;
            }
        }
        
        /* 超小屏幕适配 */
        @media (max-width: 380px) {
            header h1 {
                font-size: 1.3rem;
            }
            
            .result-header .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🕷️ 语文笔记生成器 · AI智能版</h1>
            <p>每次点击都重新爬取 + AI 重新生成 | 无缓存 | 强制刷新</p>
        </header>
        
        <div class="search-card">
            <div class="input-group">
                <input type="text" id="lessonName" placeholder="输入课文名称，例如：海底世界" />
                <button id="generateBtn" onclick="generateNote()">🚀 重新生成笔记</button>
            </div>
            
            <div class="warning">
                ⚡ 每次点击都会重新爬取 hanchacha.com 并调用 AI 重新生成，不会使用旧笔记
            </div>
            
            <div id="tokenStatus" class="token-status" style="display:none"></div>
            
            <div id="tokenInputSection" class="token-input-section">
                <label>🔑 请输入 GitHub Token</label>
                <div class="token-input-row">
                    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
                    <button class="token-save-btn" onclick="saveToken()">💾 保存</button>
                </div>
                <div class="token-hint">Token 将仅保存在本地浏览器，不会上传。需要有 repo 和 workflow 权限。</div>
            </div>
            
            <div class="repo-config-section">
                <label>📦 仓库地址配置</label>
                <div class="repo-input-row">
                    <input type="text" id="repoOwner" placeholder="用户名 (owner)" />
                    <input type="text" id="repoName" placeholder="仓库名 (repo)" />
                    <button class="repo-save-btn" onclick="saveRepoConfig()">💾 保存</button>
                </div>
                <div class="repo-current" id="repoCurrent"></div>
                <div class="repo-hint">格式: https://github.com/用户名/仓库名</div>
            </div>

            <div class="prompt-section">
                <div class="prompt-section-header">
                    <label>📝 自定义提示词</label>
                    <button class="prompt-toggle-btn" onclick="togglePromptEditor()">⚙️ 编辑提示词</button>
                </div>
                <div id="promptStatus" class="prompt-status"></div>
                <div id="promptBody" class="prompt-body">
                    <textarea id="promptTextarea" placeholder="输入提示词，用 {课文名称} 和 {参考资料} 作为占位符"></textarea>
                    <div class="prompt-hint">占位符：<code>{课文名称}</code> → 课文名，<code>{参考资料}</code> → 爬取内容。提示词保存在本地浏览器，不上传。</div>
                    <div class="prompt-actions">
                        <button class="prompt-save-btn" onclick="savePrompt()">💾 保存</button>
                        <button class="prompt-reset-btn" onclick="resetPrompt()">🗑️ 恢复默认</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p id="loadingText">🕷️ 正在触发爬虫...</p>
            <div class="progress-info" id="progressInfo"></div>
        </div>
        
        <div id="resultCard" class="result-card">
            <div class="result-header">
                <h2>📖 AI 生成结果</h2>
                <div class="btn-group">
                    <button class="copy-btn" onclick="copyNote()">📋 复制</button>
                    <button class="download-btn" onclick="downloadNote()">⬇️ 下载MD</button>
                </div>
            </div>
            <div id="noteContent" class="note-content"></div>
        </div>
        
        <div id="errorCard" class="error-card"></div>

        <div class="manage-card">
            <h2>🗂️ 数据管理</h2>
            <div style="margin-bottom:12px;">
                <button class="manage-btn" onclick="loadFileList()">🔄 查看已生成的笔记</button>
            </div>
            <div id="fileList" class="file-list"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // 默认仓库配置（如果 localStorage 中没有配置）
        const DEFAULT_REPO_OWNER = "JimmyCarter";
        const DEFAULT_REPO_NAME = "wjh-note";
        
        // 从 localStorage 读取配置，默认为空（使用默认值）
        let REPO_OWNER = localStorage.getItem('repo_owner') || DEFAULT_REPO_OWNER;
        let REPO_NAME = localStorage.getItem('repo_name') || DEFAULT_REPO_NAME;
        
        // 页面加载时更新配置显示
        function initRepoConfig() {
            document.getElementById('repoOwner').value = REPO_OWNER;
            document.getElementById('repoName').value = REPO_NAME;
            updateRepoDisplay();
        }
        
        function updateRepoDisplay() {
            const display = document.getElementById('repoCurrent');
            display.innerHTML = `当前仓库: <a href="https://github.com/${REPO_OWNER}/${REPO_NAME}" target="_blank" style="color:#667eea;">${REPO_OWNER}/${REPO_NAME}</a>`;
        }
        
        function saveRepoConfig() {
            const owner = document.getElementById('repoOwner').value.trim();
            const name = document.getElementById('repoName').value.trim();
            
            if (!owner || !name) {
                alert('请填写完整的仓库信息');
                return;
            }
            
            localStorage.setItem('repo_owner', owner);
            localStorage.setItem('repo_name', name);
            
            // 更新全局变量
            REPO_OWNER = owner;
            REPO_NAME = name;
            
            updateRepoDisplay();
            alert('✅ 仓库配置已保存！');
        }
        
        // 检查 Token 状态
        function checkTokenStatus() {
            const token = localStorage.getItem('github_token');
            const statusDiv = document.getElementById('tokenStatus');
            const inputSection = document.getElementById('tokenInputSection');
            statusDiv.style.display = 'block';
            if (token && (token.startsWith('ghp_') || token.startsWith('github_pat_'))) {
                statusDiv.innerHTML = '✅ GitHub Token 已配置，爬虫功能可用！每次都会重新生成。 <a href="#" onclick="clearToken(); return false;" style="color:#155724; font-size:0.85em;">重新设置</a>';
                statusDiv.className = 'token-status token-ok';
                inputSection.style.display = 'none';
                return true;
            } else {
                statusDiv.innerHTML = '⚠️ 未检测到 GitHub Token，请在下方输入并保存';
                statusDiv.className = 'token-status token-missing';
                inputSection.style.display = 'block';
                return false;
            }
        }
        
        function saveToken() {
            const input = document.getElementById('tokenInput');
            const token = input.value.trim();
            if (!token) {
                alert('请输入 Token');
                return;
            }
            if (!token.startsWith('ghp_') && !token.startsWith('github_pat_')) {
                if (!confirm('Token 格式看起来不对（通常以 ghp_ 开头），确定要保存吗？')) return;
            }
            localStorage.setItem('github_token', token);
            input.value = '';
            checkTokenStatus();
        }
        
        function clearToken() {
            localStorage.removeItem('github_token');
            checkTokenStatus();
        }
        
        // 生成唯一的时间戳，用于强制刷新
        function getTimestamp() {
            return new Date().getTime();
        }
        
        // 保存当前笔记内容
        let currentNote = '';
        let currentLessonName = '';
        
        async function generateNote() {
            const lessonName = document.getElementById('lessonName').value.trim();
            const generateBtn = document.getElementById('generateBtn');
            
            if (!lessonName) {
                alert('请输入课文名称');
                return;
            }
            
            // 禁用按钮，防止重复点击
            generateBtn.disabled = true;
            generateBtn.textContent = '⏳ 生成中...';
            
            // 清空所有显示
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('errorCard').style.display = 'none';
            document.getElementById('loadingText').innerHTML = '🕷️ 正在触发爬虫...';
            document.getElementById('progressInfo').innerHTML = '';
            
            const token = localStorage.getItem('github_token');
            
            try {
                // 检查 Token
                if (!token || !token.startsWith('ghp_')) {
                    throw new Error('未配置 GitHub Token，无法触发爬虫');
                }
                
                // 先检查文件是否已存在
                document.getElementById('loadingText').innerHTML = '🔍 正在检查笔记是否已存在...';
                const existingNote = await checkExistingNote(lessonName);
                
                if (existingNote) {
                    document.getElementById('loadingText').innerHTML = '✅ 找到已有笔记！';
                    displayNote(existingNote);
                    document.getElementById('loading').style.display = 'none';
                    return;
                }
                
                // 文件不存在，触发爬虫
                document.getElementById('loadingText').innerHTML = '📡 正在触发 GitHub Actions 爬虫...';
                const triggerTime = await triggerWorkflow(lessonName, token);
                
                if (!triggerTime) {
                    throw new Error('触发爬虫失败，请检查 Token 权限');
                }
                
                // 通过 Actions API 跟踪 run 状态
                const success = await waitForRunCompletion(lessonName, token, triggerTime);
                
                if (!success) {
                    throw new Error('GitHub Actions 运行失败或超时，请前往 GitHub Actions 页面查看日志。');
                }

                // run 已完成，通过 Contents API 获取文件（绕开 CDN 缓存）
                document.getElementById('loadingText').innerHTML = '📥 正在读取生成的笔记...';
                const note = await fetchNoteViaApi(lessonName, token);
                
                if (note) {
                    document.getElementById('loadingText').innerHTML = '✅ 生成完成！';
                    displayNote(note);
                    document.getElementById('loading').style.display = 'none';
                } else {
                    throw new Error('Action 已完成但未找到笔记文件，请检查 Actions 日志。');
                }
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('errorCard').innerHTML = `❌ ${error.message}<br><br>💡 提示：可以在 GitHub Actions 页面手动运行测试，查看详细日志。`;
                document.getElementById('errorCard').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            } finally {
                // 恢复按钮
                generateBtn.disabled = false;
                generateBtn.textContent = '🚀 重新生成笔记';
            }
        }
        
        // 正确解码 UTF-8 的 base64 内容（atob 只支持 Latin-1，中文需特殊处理）
        function decodeBase64Utf8(b64) {
            const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
            return new TextDecoder('utf-8').decode(bytes);
        }

        async function checkExistingNote(lessonName) {

                const resp = await fetch(url, { headers });

                const data = await resp.json();

                if (content && content.length > 500) {

                    return content;
                }
            } catch(e) {
                console.log('文件不存在，需要生成');
            }
            return null;
        }

        function togglePromptEditor() {
            const body = document.getElementById('promptBody');
            const isVisible = body.style.display === 'block';
            body.style.display = isVisible ? 'none' : 'block';
            if (!isVisible) {
                // 打开时加载当前提示词
                const saved = localStorage.getItem('custom_prompt');
                document.getElementById('promptTextarea').value = saved || DEFAULT_PROMPT;
            }
        }

        function savePrompt() {
            const val = document.getElementById('promptTextarea').value.trim();
            if (!val) { alert('提示词不能为空'); return; }
            localStorage.setItem('custom_prompt', val);
            updatePromptStatus();
            showToast('✅ 提示词已保存');
        }

        function resetPrompt() {
            if (!confirm('确定删除自定义提示词，恢复默认？')) return;
            localStorage.removeItem('custom_prompt');
            document.getElementById('promptTextarea').value = DEFAULT_PROMPT;
            updatePromptStatus();
            showToast('✅ 已恢复默认提示词');
        }

        function updatePromptStatus() {
            const saved = localStorage.getItem('custom_prompt');
            const el = document.getElementById('promptStatus');
            if (saved) {
                el.innerHTML = '<span style="color:#28a745">✅ 使用自定义提示词</span>';
            } else {
                el.innerHTML = '<span style="color:#888">使用默认提示词</span>';
            }
        }

        async function triggerWorkflow(lessonName, token) {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/crawl.yml/dispatches`;
            try {
                const triggerTime = new Date().toISOString();
                const customPrompt = localStorage.getItem('custom_prompt') || '';
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: {
                            lesson_name: lessonName,
                            custom_prompt: customPrompt
                        }
                    })
                });
                
                if (response.ok) {
                    console.log('✅ 爬虫触发成功，触发时间:', triggerTime);
                    return triggerTime;
                } else {
                    const text = await response.text();
                    console.log('❌ 触发失败:', response.status, text);
                    return null;
                }
            } catch (e) {
                console.error('触发失败:', e);
                return null;
            }
        }

        async function waitForRunCompletion(lessonName, token, triggerTime) {
            // 最多等待 5 分钟，每 5s 查一次 run 状态
            const maxWait = 300;
            const interval = 5;
            let elapsed = 0;
            let runId = null;

            const headers = {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json'
            };

            const statusLabel = {
                queued: '⏳ 等待排队中',
                in_progress: '🏃 运行中',
                completed: '✅ 已完成'
            };

            while (elapsed < maxWait) {
                await new Promise(r => setTimeout(r, interval * 1000));
                elapsed += interval;

                try {
                    // 查找触发时间之后创建的 run
                    if (!runId) {
                        const runsResp = await fetch(
                            `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/crawl.yml/runs?per_page=5`,
                            { headers }
                        );
                        if (runsResp.ok) {
                            const runsData = await runsResp.json();
                            const run = runsData.workflow_runs?.find(
                                r => new Date(r.created_at) >= new Date(triggerTime)
                            );
                            if (run) {
                                runId = run.id;
                                console.log(`🔍 找到 run ID: ${runId}`);
                            }
                        }
                    }

                    if (runId) {
                        const runResp = await fetch(
                            `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/runs/${runId}`,
                            { headers }
                        );
                        if (runResp.ok) {
                            const run = await runResp.json();
                            const label = statusLabel[run.status] || run.status;
                            document.getElementById('loadingText').innerHTML = `${label}：${run.name}`;
                            document.getElementById('progressInfo').innerHTML =
                                `⏱️ 已等待 ${elapsed}s　状态：${run.status}　Run #${runId}`;

                            if (run.status === 'completed') {
                                console.log(`🏁 run 完成，结论: ${run.conclusion}`);
                                return run.conclusion === 'success';
                            }
                        }
                    } else {
                        document.getElementById('progressInfo').innerHTML =
                            `⏳ 等待 Actions 启动中（已等待 ${elapsed}s）`;
                    }
                } catch(e) {
                    console.warn('查询 run 状态失败:', e);
                }
            }
            return false; // 超时
        }

        async function fetchNoteViaApi(lessonName, token) {
            // 通过 Contents API 获取文件，完全绕开 raw.githubusercontent.com 的 CDN 缓存
            try {
                const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data/${encodeURIComponent(lessonName)}.md`;
                const resp = await fetch(url, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                if (!resp.ok) return null;
                const data = await resp.json();
                // Contents API 返回 base64 编码的内容
                const content = decodeBase64Utf8(data.content.replace(/\n/g, ''));
                return content.length > 100 ? content : null;
            } catch(e) {
                console.error('fetchNoteViaApi 失败:', e);
                return null;
            }
        }
        
        function displayNote(note) {
            currentNote = note;
            currentLessonName = document.getElementById('lessonName').value.trim();
            
            // 使用 marked.js 渲染 Markdown
            marked.setOptions({ breaks: true, gfm: true });
            document.getElementById('noteContent').innerHTML = marked.parse(note);
            document.getElementById('resultCard').style.display = 'block';
        }
        
        async function loadFileList() {
            const token = localStorage.getItem('github_token');
            const listEl = document.getElementById('fileList');
            listEl.innerHTML = '⏳ 加载中...';
            try {
                const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data`;
                const headers = { 'Accept': 'application/vnd.github.v3+json' };
                if (token) headers['Authorization'] = `token ${token}`;
                const resp = await fetch(url, { headers });
                if (resp.status === 404) {
                    listEl.innerHTML = '<p style="color:#888;">暂无笔记文件</p>';
                    return;
                }
                if (!resp.ok) throw new Error(`请求失败 ${resp.status}`);
                const files = await resp.json();
                const mdFiles = files.filter(f => f.name.endsWith('.md'));
                if (mdFiles.length === 0) {
                    listEl.innerHTML = '<p style="color:#888;">暂无笔记文件</p>';
                    return;
                }
                listEl.innerHTML = '';
                mdFiles.forEach(file => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.innerHTML = `
                        <span>📄 ${file.name.replace('.md', '')}</span>
                        <div style="display:flex;gap:6px;">
                            <button class="manage-btn" style="padding:4px 10px;font-size:0.8rem;background:#667eea;" onclick="viewFile('${file.path}', '${file.name.replace('.md','')}', this)">👁️ 查看</button>
                            <button class="manage-btn" style="padding:4px 10px;font-size:0.8rem;background:#28a745;" onclick="downloadFileByPath('${file.path}', '${file.name}')">⬇️ 下载</button>
                            <button class="delete-file-btn" onclick="deleteFile('${file.path}', '${file.sha}', this)">🗑️ 删除</button>
                        </div>
                    `;
                    listEl.appendChild(item);
                });
            } catch(e) {
                listEl.innerHTML = `<p style="color:#dc3545;">加载失败: ${e.message}</p>`;
            }
        }

        async function viewFile(filePath, lessonName, btn) {
            const token = localStorage.getItem('github_token');
            const orig = btn.textContent;
            btn.disabled = true;
            btn.textContent = '加载中...';
            try {
                const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${filePath}`;
                const headers = { 'Accept': 'application/vnd.github.v3+json' };
                if (token) headers['Authorization'] = `token ${token}`;
                const resp = await fetch(url, { headers });
                if (!resp.ok) throw new Error(`请求失败 ${resp.status}`);
                const data = await resp.json();
                const content = decodeBase64Utf8(data.content.replace(/\n/g, ''));
                currentNote = content;
                currentLessonName = lessonName;
                marked.setOptions({ breaks: true, gfm: true });
                document.getElementById('noteContent').innerHTML = marked.parse(content);
                document.getElementById('resultCard').style.display = 'block';
                document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
            } catch(e) {
                alert(`加载失败: ${e.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = orig;
            }
        }

        async function downloadFileByPath(filePath, fileName) {
            const token = localStorage.getItem('github_token');
            try {
                const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${filePath}`;
                const headers = { 'Accept': 'application/vnd.github.v3+json' };
                if (token) headers['Authorization'] = `token ${token}`;
                const resp = await fetch(url, { headers });
                if (!resp.ok) throw new Error(`请求失败 ${resp.status}`);
                const data = await resp.json();
                const content = decodeBase64Utf8(data.content.replace(/\n/g, ''));
                const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);
                showToast(`⬇️ ${fileName} 已下载`);
            } catch(e) {
                alert(`下载失败: ${e.message}`);
            }
        }

        async function deleteFile(filePath, sha, btn) {
            const token = localStorage.getItem('github_token');
            if (!token) { alert('请先配置 GitHub Token'); return; }
            const name = filePath.split('/').pop().replace('.md', '');
            if (!confirm(`确定删除《${name}》的笔记吗？`)) return;
            btn.disabled = true;
            btn.textContent = '删除中...';
            try {
                const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${filePath}`;
                const resp = await fetch(url, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `删除笔记: ${name}`,
                        sha: sha
                    })
                });
                if (resp.ok) {
                    const item = btn.closest('.file-item');
                    item.style.transition = 'opacity 0.3s';
                    item.style.opacity = '0';
                    setTimeout(() => {
                        item.remove();
                        const listEl = document.getElementById('fileList');
                        if (!listEl.querySelector('.file-item')) {
                            listEl.innerHTML = '<p style="color:#888;">暂无笔记文件</p>';
                        }
                    }, 300);
                    showToast(`✅ 《${name}》已删除`);
                } else {
                    const err = await resp.json();
                    alert(`删除失败: ${err.message}`);
                    btn.disabled = false;
                    btn.textContent = '🗑️ 删除';
                }
            } catch(e) {
                alert(`删除失败: ${e.message}`);
                btn.disabled = false;
                btn.textContent = '🗑️ 删除';
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function copyNote() {
            const text = document.getElementById('noteContent').innerText;
            navigator.clipboard.writeText(text);
            alert('✅ 笔记已复制到剪贴板');
        }
        
        function downloadNote() {
            if (!currentNote) {
                alert('没有可下载的笔记');
                return;
            }
            
            // 创建下载链接
            const blob = new Blob([currentNote], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${currentLessonName || '笔记'}.md`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
        
        // 回车生成
        document.getElementById('lessonName').addEventListener('keypress', e => {
            if (e.key === 'Enter') generateNote();
        });
        
        // 页面加载检查
        initRepoConfig();
        checkTokenStatus();
        updatePromptStatus();
        console.log('📚 语文笔记生成器已加载（强制重新生成模式）');
        console.log('💡 每次点击都会重新爬取 + AI 重新生成，不使用任何缓存');
