<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语文笔记生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .search-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .input-group input {
            flex: 1;
            padding: 15px 20px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            border-color: #667eea;
        }
        
        .input-group button {
            padding: 15px 30px;
            font-size: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .input-group button:hover {
            transform: translateY(-2px);
        }
        
        .loading {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            display: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .result-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: none;
        }
        
        .result-header {
            background: #f8f9fa;
            padding: 20px 30px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .result-header h2 {
            color: #333;
        }
        
        .copy-btn {
            padding: 8px 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .note-content {
            padding: 30px;
            line-height: 1.8;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .error-card {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        
        .examples {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        .examples p {
            color: #666;
            margin-bottom: 10px;
        }
        
        .example-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .example-btn {
            padding: 5px 12px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .example-btn:hover {
            background: #667eea;
            color: white;
        }
        
        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

    <div class="container">
        <header>
            <h1>📚 语文笔记生成器</h1>
            <p>输入课文名称，自动生成学霸综合笔记</p>
        </header>
        
        <div class="search-card">
            <div class="input-group">
                <input type="text" id="lessonName" placeholder="例如：海底世界、桂林山水、草船借箭..." />
                <button onclick="generateNote()">✨ 生成笔记</button>
            </div>
            
            <div class="examples">
                <p>📖 试试这些课文：</p>
                <div class="example-buttons">
                    <span class="example-btn" onclick="setLesson('海底世界')">海底世界</span>
                    <span class="example-btn" onclick="setLesson('桂林山水')">桂林山水</span>
                    <span class="example-btn" onclick="setLesson('匆匆')">匆匆</span>
                    <span class="example-btn" onclick="setLesson('静夜思')">静夜思</span>
                    <span class="example-btn" onclick="setLesson('背影')">背影</span>
                </div>
            </div>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>📝 正在生成笔记，请稍候...</p>
            <p style="font-size: 0.85rem; color: #666; margin-top: 10px;">⏱️ 大约需要 2-3 秒</p>
        </div>
        
        <div id="resultCard" class="result-card">
            <div class="result-header">
                <h2>📖 生成结果</h2>
                <button class="copy-btn" onclick="copyNote()">📋 复制笔记</button>
            </div>
            <div id="noteContent" class="note-content"></div>
        </div>
        
        <div id="errorCard" class="error-card"></div>
    </div>

    <script>

> 一份集**知识点、课堂笔记、教学思路**于一体的超实用手册，专治"阅读没方法，写作干巴巴"！

---

## 📚 一、课文一瞥：它讲了什么？

《海底世界》是一篇**科普性说明文**。作者化身"深海导游"，带我们穿过波涛澎湃的海面，潜入宁静深邃的海底，揭开了那个**景色奇异、物产丰富**的神秘世界。

*   **核心问题**：大海深处是怎样的？
*   **主要内容**：从**环境、动物、植物、矿产**四个方面具体介绍。
*   **中心句**：海底真是个**景色奇异、物产丰富**的世界！

---

## 🧱 二、文章结构：总分总，超清晰！

| 部分 | 自然段 | 内容 | 作用 |
|------|--------|------|------|
| **第一部分** | 1 | 提出问题 | 引出下文 |
| **第二部分** | 2-6 | 介绍海底环境、动物、植物、矿藏 | 分述 |
| **第三部分** | 7 | 总结全文 | 首尾呼应 |

---

## ✨ 三、写作手法

### 1. 对比手法
- 海面波涛澎湃 vs 海底宁静
- 黑暗深海 vs 闪烁光点
- 宁静海底 vs 动物声音

### 2. 拟人手法
- "窃窃私语"——把动物声音当人写
- "免费的长途旅行"——贝类被写活了

### 3. 说明方法
- **列数字**：海参每小时四米，梭子鱼每小时几十千米
- **作比较**：梭子鱼比火车还快
- **举例子**：海参、梭子鱼、乌贼、章鱼、贝类

---

## 📝 四、词语积累

| 类别 | 词语 |
|------|------|
| **必会词** | 宁静、器官、危险、迅速、后退、攻击 |
| **近义词** | 宁静—安静、迅速—快速、奇异—奇妙 |
| **反义词** | 宁静—热闹、危险—安全、丰富—贫乏 |
| **AABC式** | 窃窃私语、津津有味、井井有条 |

---

## 🎯 五、课后挑战

1. **朗读小能手**：有感情地朗读课文，背诵第3自然段
2. **小小解说员**：向家人介绍海底世界
3. **妙笔生花**：用"总分总"结构写一段介绍文字

---

*✨ 海底世界真奇妙，一起探索吧！*`,

## 📚 一、诗意理解

        function setLesson(lessonName) {
            document.getElementById('lessonName').value = lessonName;
            generateNote();
        }
        
        async function generateNote() {
            const lessonName = document.getElementById('lessonName').value.trim();
            
            if (!lessonName) {
                alert('请输入课文名称！');
                return;
            }
            
            // 隐藏之前的显示
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('errorCard').style.display = 'none';
            
            // 模拟网络请求延迟
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            try {
                // 查找笔记
                let note = notesDatabase[lessonName];
                
                if (!note) {
                    // 尝试模糊匹配（比如用户输入"海底世界"但数据库是"海底世界"）
                    for (let key in notesDatabase) {
                        if (lessonName.includes(key) || key.includes(lessonName)) {
                            note = notesDatabase[key];
                            break;
                        }
                    }
                }
                
                // 如果还是没找到，使用通用模板
                if (!note) {
                    note = getGenericNote(lessonName);
                }
                
                // 显示笔记
                document.getElementById('noteContent').innerHTML = note
                    .replace(/\n/g, '<br>')
                    .replace(/#{3,}/g, match => `<h3>${match}</h3>`)
                    .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                    .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                    .replace(/\|/g, '|'); // 表格简单处理
                
                document.getElementById('resultCard').style.display = 'block';
                
            } catch (error) {
                document.getElementById('errorCard').innerHTML = `❌ 生成失败：${error.message}<br><br>请稍后重试。`;
                document.getElementById('errorCard').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function copyNote() {
            const noteContent = document.getElementById('noteContent').innerText;
            navigator.clipboard.writeText(noteContent).then(() => {
                alert('✅ 笔记已复制到剪贴板！');
            }).catch(() => {
                alert('复制失败，可以手动选中文字复制');
            });
        }
        
        // 按回车键也可以生成
        document.getElementById('lessonName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateNote();
            }
        });
    </script>
